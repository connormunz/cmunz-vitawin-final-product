{% extends "layout.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 text-center">
        <h2 class="mb-4">Today's Adherence</h2>
        
        <div class="card shadow-sm mb-4">
            <div class="card-body">
                <h3 class="h5 text-muted">Status for Today:</h3>
                {% if last_log %}
                    <div class="alert {% if last_log.status == 'Taken' %}alert-success{% else %}alert-warning{% endif %}">
                        <strong>{{ last_log.status }}</strong> at {{ last_log.timestamp.strftime('%H:%M %p') }}
                    </div>
                {% else %}
                    <div class="alert alert-secondary">No activity logged yet.</div>
                {% endif %}
            </div>
        </div>

        <div class="d-grid gap-3">
            <form action="/log/Taken" method="POST">
                <button type="submit" class="btn btn-success btn-lg w-100 py-3 shadow">
                    LOG AS: TAKEN
                </button>
            </form>
            <form action="/log/Skipped" method="POST">
                <button type="submit" class="btn btn-outline-danger btn-lg w-100 py-3">
                    LOG AS: SKIPPED
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
